      { name: '其他', icon: 'https://assets.pokemon.com/assets/cms2/img/pokedex/full/132.png', color: 'bg-slate-100 text-slate-800' }
    ];

    const ROUTINE_TASKS = ['🚗 送兒子上學', '🏫 接兒子下課', '🍽️ 洗碗', '🗑️ 倒垃圾', '🐈 鏟貓砂', '🧺 洗衣服', '☀️ 曬衣服', '💪 運動健身'];

    const POKE_IMAGES = {
      pikachu: "https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png",
      eevee: "https://assets.pokemon.com/assets/cms2/img/pokedex/full/133.png",
      meowth: "https://assets.pokemon.com/assets/cms2/img/pokedex/full/052.png",
      snorlax: "https://assets.pokemon.com/assets/cms2/img/pokedex/full/143.png",
      lucario: "https://assets.pokemon.com/assets/cms2/img/pokedex/full/448.png",
      charizard: "https://assets.pokemon.com/assets/cms2/img/pokedex/full/006.png",
      slowpoke: "https://assets.pokemon.com/assets/cms2/img/pokedex/full/079.png",
      pokeball: "https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg" 
    };

    function App() {
      const [user, setUser] = useState(undefined); 
      const [needsConfig, setNeedsConfig] = useState(!isFirebaseInitialized);
      const [configInput, setConfigInput] = useState('');
      const [setupError, setSetupError] = useState('');
      const [systemMessage, setSystemMessage] = useState(''); 
      
      const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
      const [activeTab, setActiveTab] = useState('accounting'); 

      const [calYear, setCalYear] = useState(new Date().getFullYear());
      const [calMonth, setCalMonth] = useState(new Date().getMonth());

      const [transactionMode, setTransactionMode] = useState('expense'); 
      const [amount, setAmount] = useState('');
      const [type, setType] = useState('午餐');
      const [note, setNote] = useState('');
      const [diaryText, setDiaryText] = useState('');
      const [isSavingDiary, setIsSavingDiary] = useState(false);

      const [allExpenses, setAllExpenses] = useState([]);
      const [allDiaries, setAllDiaries] = useState([]);
      
      const [showDayModal, setShowDayModal] = useState(false);

      const appId = window.__app_id || 'pokemon-log-app';

      // Auth 監聽
      useEffect(() => {
        if (!isFirebaseInitialized) return;
        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
          } else {
            const token = window.__initial_auth_token || (typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null);
            if (token) {
              try { await signInWithCustomToken(auth, token); } 
              catch (e) { setUser(null); }
            } else {
              setUser(null);
            }
          }
        });
        return () => unsubscribe();
      }, [needsConfig]);

      // 資料抓取
      useEffect(() => {
        if (!user || !isFirebaseInitialized) return;
        const expensesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'expenses');
        const unsubExpenses = onSnapshot(expensesRef, (snapshot) => {
          const expensesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAllExpenses(expensesData);
          setSystemMessage(''); 
        }, (error) => setSystemMessage("讀取失敗：請檢查 Firebase 資料庫規則！"));

        const diaryRef = collection(db, 'artifacts', appId, 'users', user.uid, 'diary');
        const unsubDiary = onSnapshot(diaryRef, (snapshot) => {
          const diaryData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAllDiaries(diaryData);
        }, (error) => console.error("讀取日記失敗"));

        return () => { unsubExpenses(); unsubDiary(); };
      }, [user]);

      useEffect(() => {
        const todayDiary = allDiaries.find(d => d.date === currentDate);
        setDiaryText(todayDiary ? todayDiary.text : '');
      }, [currentDate, allDiaries]);

      useEffect(() => {
        const d = new Date(currentDate);
        setCalYear(d.getFullYear());
        setCalMonth(d.getMonth());
      }, [currentDate]);

      const todaysExpenses = useMemo(() => {
        return allExpenses.filter(e => e.date === currentDate).sort((a, b) => b.createdAt - a.createdAt);
      }, [allExpenses, currentDate]);

      const currentMonthStats = useMemo(() => {
        const monthPrefix = currentDate.substring(0, 7);
        const monthExpenses = allExpenses.filter(e => e.date.startsWith(monthPrefix));
        const stats = {}; let totalExpense = 0; let totalIncome = 0;
        monthExpenses.forEach(e => { 
          const mode = e.transactionMode || 'expense';
          if (mode === 'expense') {
            stats[e.type] = (stats[e.type] || 0) + e.amount; 
            totalExpense += e.amount;
          } else {
            totalIncome += e.amount;
          }
        });
        return { stats, totalExpense, totalIncome, net: totalIncome - totalExpense };
      }, [allExpenses, currentDate]);

      const handleExportCSV = () => {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
        csvContent += "日期,收支,分類,金額,備註\n";
        allExpenses.sort((a, b) => a.createdAt - b.createdAt).forEach(e => {
            const mode = e.transactionMode === 'income' ? '收入' : '支出';
            csvContent += `${e.date},${mode},${e.type},${e.amount},${e.note || ''}\n`;
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `竹北山下智久手帳_紀錄_${calYear}年${calMonth+1}月.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleGoogleLogin = async () => {
        const provider = new GoogleAuthProvider();
        try { await signInWithPopup(auth, provider); } 
        catch (error) { setSystemMessage("登入失敗，請確認 Firebase 設定！"); }
      };

      const handleLogout = async () => {
        if(confirm("確定要登出並離開手帳嗎？")) {
          try { await signOut(auth); } catch (error) {}
        }
      };

      const handleAddExpense = async (e) => {
        e.preventDefault();
        if (!user || !amount || isNaN(amount)) return;
        const newExpense = { date: currentDate, type, amount: parseFloat(amount), note, transactionMode, createdAt: Date.now() };
        try {
          const newDocRef = doc(collection(db, 'artifacts', appId, 'users', user.uid, 'expenses'));
          await setDoc(newDocRef, newExpense);
          setAmount(''); setNote('');
        } catch (error) {}
      };

      const handleDeleteExpense = async (id) => {
        if (!user) return;
        try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'expenses', id)); } 
        catch (error) {}
      };

      const handleSaveDiary = async () => {
        if (!user) return;
        setIsSavingDiary(true);
        try {
          const diaryDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'diary', currentDate);
          await setDoc(diaryDocRef, { date: currentDate, text: diaryText, updatedAt: Date.now() });
          setTimeout(() => setIsSavingDiary(false), 500);
        } catch (error) { setIsSavingDiary(false); }
      };

      if (needsConfig || user === null) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-yellow-50 via-orange-50 to-blue-50 flex items-center justify-center p-4 font-sans">
             <div className="bg-white/90 backdrop-blur-md p-10 rounded-3xl shadow-2xl max-w-md w-full border-4 border-yellow-400 text-center relative overflow-hidden">
               <img src={POKE_IMAGES.eevee} className="absolute -bottom-6 -right-6 w-32 h-32 opacity-20 object-contain pointer-events-none" />
               <div className="flex justify-center mb-6 relative z-10"><img src={POKE_IMAGES.pikachu} className="w-32 h-32 object-contain drop-shadow-lg" /></div>
               <h1 className="text-3xl font-extrabold text-gray-800 mb-2">竹北山下智久的手帳</h1>
               <p className="text-gray-500 mb-8 font-medium">登入專屬帳號，冒險紀錄永遠跟著你！</p>
               <button onClick={handleGoogleLogin} className="w-full bg-white border-2 border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-2xl shadow-sm flex items-center justify-center gap-3 relative z-10">
                 <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6" /> 使用 Google 帳號登入
               </button>
             </div>
          </div>
        );
      }

      if (user === undefined) {
        return <div className="min-h-screen flex items-center justify-center bg-yellow-50 font-bold text-yellow-800 text-xl"><img src={POKE_IMAGES.pokeball} className="w-12 h-12 animate-spin mr-3 opacity-80" /> 讀取冒險資料中...</div>;
      }

      // 數學計算日曆所需的空白格子 (完美解決五月、八月換行破圖的防爆網格機制)
      const startDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const totalCells = startDay + daysInMonth;
      const numWeeks = Math.ceil(totalCells / 7);
      const trailingEmpty = (numWeeks * 7) - totalCells;

      return (
        <div className="h-screen w-screen flex flex-col bg-[#f8fafc] overflow-hidden">
          
          {/* 頂部導覽列 */}
          <header className="bg-white shadow-sm border-b border-gray-200 px-4 md:px-6 py-3 flex items-center justify-between flex-shrink-0 z-20">
            <div className="flex items-center gap-3">
              <img src={POKE_IMAGES.pikachu} className="w-10 h-10 md:w-12 md:h-12 object-contain" />
              <h1 className="text-xl md:text-2xl font-black text-gray-800 tracking-wide">竹北山下智久的手帳</h1>
            </div>
            <div className="flex items-center gap-4">
              <span className="hidden md:block text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full">{user.email || '冒險者'}</span>
              <button onClick={handleLogout} className="flex items-center p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors" title="登出">
                <LogOut className="w-5 h-5" />
              </button>
            </div>
          </header>

          {/* 主要內容區 */}
          <div className="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
            
            {/* 左側：全螢幕 Google 日曆風格 */}
            <div className="flex-1 flex flex-col bg-white overflow-hidden relative shadow-sm z-10">
              
              {/* 絕對居中的浮水印寶可夢 (保證不被遮擋) */}
              <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
                <img src={MONTHLY_POKEMON[calMonth]} className="w-64 h-64 md:w-[400px] md:h-[400px] opacity-15 object-contain transition-all duration-500 drop-shadow-sm" />
              </div>

              {/* 日曆控制列 */}
              <div className="flex justify-between items-center px-6 py-4 border-b border-gray-100 bg-white/90 backdrop-blur-sm z-20 flex-shrink-0 shadow-sm">
                <div className="flex items-center gap-4">
                  <button onClick={() => { setCurrentDate(new Date().toISOString().split('T')[0]); setCalYear(new Date().getFullYear()); setCalMonth(new Date().getMonth()); }} className="px-4 py-2 border border-gray-300 rounded-lg text-sm font-bold text-gray-600 hover:bg-gray-50">今天</button>
                  <div className="flex items-center gap-1">
                    <button onClick={() => { let newM = calMonth - 1; let newY = calYear; if(newM < 0) { newM = 11; newY--; } setCalMonth(newM); setCalYear(newY); }} className="p-1.5 hover:bg-gray-100 rounded-full"><ChevronLeft className="w-5 h-5 text-gray-600" /></button>
                    <button onClick={() => { let newM = calMonth + 1; let newY = calYear; if(newM > 11) { newM = 0; newY++; } setCalMonth(newM); setCalYear(newY); }} className="p-1.5 hover:bg-gray-100 rounded-full"><ChevronRight className="w-5 h-5 text-gray-600" /></button>
                  </div>
                  <h2 className="text-2xl font-black text-gray-800 tracking-wide ml-2">{calYear}年 {calMonth + 1}月</h2>
                </div>
              </div>
              
              {/* 日曆網格主體 (100% 精準對齊法) */}
              <div className="flex-1 overflow-auto custom-scrollbar bg-white/60 backdrop-blur-[1px] relative z-10 p-2 md:p-4">
                {/* 加上最外層的邊框，確保表格完整 */}
                <div className="min-w-[600px] lg:min-w-full flex flex-col h-full border-t border-l border-gray-200 bg-white/40">
                  
                  {/* 星期標題區塊 - 使用 Sticky 固定，並與下方格子完美對齊 */}
                  <div className="grid grid-cols-7 flex-shrink-0 bg-white/95 backdrop-blur-md sticky top-0 z-30 shadow-sm border-b border-gray-200">
                    {WEEKDAYS.map((day, idx) => (
                      <div key={`header-${idx}`} className={`border-r border-gray-200 flex flex-col xl:flex-row items-center justify-center py-2 lg:py-3 gap-1 md:gap-2 ${day.color}`}>
                        <span className="text-xs md:text-sm font-black whitespace-nowrap">{day.tw}</span>
                        <img src={day.poke} className="w-6 h-6 md:w-8 md:h-8 object-contain drop-shadow-sm flex-shrink-0" title={day.tw} />
                      </div>
                    ))}
                  </div>
                  
                  {/* 日期格子區塊 (自動依照週數展開) */}
                  <div 
                    className="grid grid-cols-7 flex-1"
                    style={{ gridTemplateRows: `repeat(${numWeeks}, minmax(120px, 1fr))` }}
                  >
                    {/* 月初空白格 */}
                    {Array.from({ length: startDay }).map((_, i) => <div key={`empty-start-${i}`} className="calendar-cell bg-gray-50/40"></div>)}
                    
                    {/* 當月日期 */}
                    {Array.from({ length: daysInMonth }).map((_, i) => {
                      const day = i + 1;
                      const dateStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                      const isToday = dateStr === new Date().toISOString().split('T')[0];
                      const isSelected = dateStr === currentDate;
                      const holidayName = TAIWAN_HOLIDAYS_MAP[dateStr];
                      const dayOfWeek = new Date(calYear, calMonth, day).getDay();
                      const lunarLabel = LUNAR_FIRST_MAP[dateStr] || (LUNAR_FIFTEENTH.includes(dateStr) ? '十五' : null);
                      
                      let numColor = (dayOfWeek === 0 || holidayName) ? 'text-red-500' : (dayOfWeek === 6 ? 'text-gray-500' : 'text-gray-800');
                      
                      const dayExpenses = allExpenses.filter(e => e.date === dateStr);
                      const dayDiary = allDiaries.find(d => d.date === dateStr);
                      
                      // 篩選非例行性待辦
                      const allTasks = dayDiary && dayDiary.text ? dayDiary.text.split('\n').filter(t => t.trim() !== '') : [];
                      const nonRoutineTasks = allTasks.filter(task => !ROUTINE_TASKS.some(routine => task.includes(routine)));

                      let cellBg = 'bg-transparent';
                      if (isSelected) {
                        cellBg = 'bg-blue-100/70';
                      } else if (isToday) {
                        cellBg = 'bg-yellow-50/80';
                      } else if (holidayName) {
                        cellBg = 'bg-red-50/40';
                      } else if (dayOfWeek === 0 || dayOfWeek === 6) {
                        cellBg = 'bg-slate-50/40';
                      }

                      return (
                        <div key={day} onClick={() => { 
                          setCurrentDate(dateStr); 
                          // 防呆：如果當天是完全空白的，點下去不彈窗，只會選取該日
                          if (dayExpenses.length > 0 || (dayDiary && dayDiary.text.trim() !== '')) {
                            setShowDayModal(true); 
                          }
                        }} className={`calendar-cell relative p-1.5 flex flex-col cursor-pointer transition-colors hover:bg-blue-50/80 group min-w-0 ${cellBg} ${isSelected ? 'ring-2 ring-inset ring-blue-400 z-20' : 'z-10'}`}>
                          
                          {/* 頂部：節日與日期數字 */}
                          <div className="flex justify-between items-start mb-1.5 flex-shrink-0 min-w-0">
                            <div className="flex flex-col items-start leading-none gap-1 mt-0.5 min-w-0 pr-1">
                              {holidayName && <span className="text-[10px] text-red-600 font-bold bg-white/90 px-1.5 py-0.5 rounded shadow-sm truncate w-full">{holidayName}</span>}
                              {!holidayName && lunarLabel && <span className="text-[10px] text-gray-500 font-bold bg-white/60 px-1 rounded truncate w-full">{lunarLabel}</span>}
                            </div>
                            <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full flex-shrink-0 ${isToday ? 'bg-blue-600 text-white shadow-md' : numColor}`}>{day}</span>
                          </div>
                          
                          {/* 內容區塊：只顯示前 4 個非例行待辦 (記帳完全不顯示，只在總覽顯示) */}
                          <div className="flex-1 overflow-hidden flex flex-col gap-1.5 min-w-0 w-full">
                            {nonRoutineTasks.slice(0, 4).map((task, idx) => (
                              <div key={`task-${idx}`} className="bg-blue-500 text-white text-[10px] md:text-[11px] font-medium px-1.5 py-0.5 rounded-md truncate shadow-sm w-full">
                                {task}
                              </div>
                            ))}
                            {nonRoutineTasks.length > 4 && <div className="text-[9px] text-blue-600 font-bold px-1 tracking-wider flex-shrink-0">...還有更多</div>}
                            
                            {/* 顯示記帳的微小提示 (隱藏金額，只顯示種類) */}
                            {dayExpenses.map(e => (
                              <div key={e.id} className={`text-[10px] md:text-[11px] font-bold px-1.5 py-0.5 rounded-md truncate shadow-sm bg-white/95 w-full ${e.transactionMode === 'income' ? 'text-green-700' : 'text-red-600'}`}>
                                💰 {e.type}
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                    
                    {/* 月尾空白格 (自動補齊，保證五月、八月最後一排也畫出完美的矩形，絕對不破圖) */}
                    {Array.from({ length: trailingEmpty }).map((_, i) => <div key={`trailing-end-${i}`} className="calendar-cell bg-gray-50/40"></div>)}
                  </div>
                </div>
              </div>
            </div>

            {/* 右側：精簡版側邊工具欄 */}
            <div className="w-full lg:w-[380px] xl:w-[420px] flex-shrink-0 flex flex-col bg-[#f8fafc] z-20 border-l border-gray-200 shadow-2xl">
              
              <div className="flex bg-gray-200 p-1.5 mx-4 mt-4 rounded-xl flex-shrink-0">
                <button onClick={() => setActiveTab('accounting')} className={`flex-1 py-1.5 text-sm font-bold rounded-lg transition-all flex items-center justify-center gap-1.5 ${activeTab === 'accounting' ? 'bg-white shadow text-yellow-600' : 'text-gray-500 hover:text-gray-700'}`}><Zap className="w-4 h-4" /> 記帳</button>
                <button onClick={() => setActiveTab('diary')} className={`flex-1 py-1.5 text-sm font-bold rounded-lg transition-all flex items-center justify-center gap-1.5 ${activeTab === 'diary' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}><Shield className="w-4 h-4" /> 日記</button>
                <button onClick={() => setActiveTab('stats')} className={`flex-1 py-1.5 text-sm font-bold rounded-lg transition-all flex items-center justify-center gap-1.5 ${activeTab === 'stats' ? 'bg-white shadow text-orange-600' : 'text-gray-500 hover:text-gray-700'}`}><Flame className="w-4 h-4" /> 統計</button>
              </div>

              <div className="flex-1 overflow-y-auto custom-scrollbar p-4 flex flex-col">
                
                {/* 記帳面板 */}
                {activeTab === 'accounting' && (
                  <div className="flex flex-col gap-6 h-full">
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex-shrink-0">
                      <div className="flex items-center justify-between mb-4">
                        <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2"><img src={POKE_IMAGES.meowth} className="w-6 h-6 object-contain" /> {currentDate}</h2>
                        <div className="flex bg-gray-100 rounded-md p-0.5">
                          <button onClick={() => {setTransactionMode('expense'); setType('午餐');}} className={`px-3 py-1 rounded text-xs font-bold transition-all ${transactionMode === 'expense' ? 'bg-white shadow-sm text-red-500' : 'text-gray-500'}`}>支出</button>
                          <button onClick={() => {setTransactionMode('income'); setType('薪水');}} className={`px-3 py-1 rounded text-xs font-bold transition-all ${transactionMode === 'income' ? 'bg-white shadow-sm text-green-600' : 'text-gray-500'}`}>收入</button>
                        </div>
                      </div>
                      
                      <form onSubmit={handleAddExpense} className="space-y-4">
                        <div className="grid grid-cols-4 gap-1.5">
                          {(transactionMode === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES).map(cat => (
                            <button key={cat.name} type="button" onClick={() => setType(cat.name)} className={`py-1.5 rounded-lg flex flex-col items-center justify-center gap-0.5 transition-all border ${type === cat.name ? 'bg-yellow-50 border-yellow-400 ring-1 ring-yellow-400 font-bold' : 'bg-gray-50 border-gray-100 hover:bg-gray-100'}`}>
                              <img src={cat.icon} className="w-6 h-6 object-contain" />
                              <span className="text-[10px] text-gray-700">{cat.name}</span>
                            </button>
                          ))}
                        </div>
                        <div className="flex gap-2">
                          <div className="relative flex-1">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">$</span>
                            <input type="number" required value={amount} onChange={(e) => setAmount(e.target.value)} className="w-full pl-7 pr-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:border-yellow-400 focus:bg-white transition-colors font-bold shadow-inner text-sm" placeholder="金額" />
                          </div>
                          <input type="text" value={note} onChange={(e) => setNote(e.target.value)} className="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:border-yellow-400 focus:bg-white transition-colors shadow-inner text-sm" placeholder="備註..." />
                        </div>
                        <button type="submit" className="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-2.5 rounded-xl shadow-sm active:scale-95 flex items-center justify-center gap-1 text-sm"><Save className="w-4 h-4" /> 記錄</button>
                      </form>
                    </div>

                    <div className="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-col min-h-0">
                      <div className="flex justify-between items-center mb-3 flex-shrink-0">
                        <h3 className="text-sm font-bold text-gray-500">今日明細</h3>
                        <div className={`text-base font-black ${todaysExpenses.reduce((sum, e) => sum + (e.transactionMode==='income'?e.amount:-e.amount), 0) >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                          ${todaysExpenses.reduce((sum, e) => sum + (e.transactionMode==='income'?e.amount:-e.amount), 0)}
                        </div>
                      </div>
                      <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-2">
                        {todaysExpenses.length === 0 ? (
                          <div className="text-center py-8 text-gray-400 text-xs font-bold flex flex-col items-center">
                            <img src={POKE_IMAGES.snorlax} className="w-16 h-16 opacity-60 mb-2" /> 尚未有紀錄
                          </div>
                        ) : (
                          todaysExpenses.map(e => {
                            const isIncome = e.transactionMode === 'income';
                            const catInfo = (isIncome ? INCOME_CATEGORIES : EXPENSE_CATEGORIES).find(c => c.name === e.type) || (isIncome ? INCOME_CATEGORIES.find(c => c.name === '其他') : EXPENSE_CATEGORIES.find(c => c.name === '其他'));
                            return (
                              <div key={e.id} className="flex justify-between items-center p-2 bg-gray-50 rounded-xl group border border-transparent hover:border-gray-200 min-w-0">
                                <div className="flex items-center gap-2 truncate min-w-0">
                                  <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${catInfo.color}`}><img src={catInfo.icon} className="w-5 h-5" /></div>
                                  <div className="truncate min-w-0">
                                    <div className="text-sm font-bold text-gray-700 leading-tight">{e.type}</div>
                                    {e.note && <div className="text-[10px] text-gray-500 truncate min-w-0">{e.note}</div>}
                                  </div>
                                </div>
                                <div className="flex items-center gap-2 pl-2 flex-shrink-0">
                                  <span className={`font-black text-sm ${isIncome ? 'text-green-600' : 'text-red-500'}`}>{isIncome ? '+' : '-'}${e.amount}</span>
                                  <button onClick={() => handleDeleteExpense(e.id)} className="text-gray-300 hover:text-red-500 p-1 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 className="w-4 h-4" /></button>
                                </div>
                              </div>
                            )
                          })
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {/* 日記面板 */}
                {activeTab === 'diary' && (
                  <div className="flex flex-col h-full bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                    <h2 className="text-lg font-bold text-blue-800 flex items-center gap-2 mb-3"><img src={POKE_IMAGES.lucario} className="w-6 h-6 object-contain" /> {currentDate} 待辦/日記</h2>
                    <div className="flex flex-wrap gap-1.5 mb-3 flex-shrink-0">
                      {ROUTINE_TASKS.map(task => (
                        <button key={task} onClick={() => setDiaryText(prev => prev + (prev ? '\n' : '') + task)} className="px-2.5 py-1 bg-gray-50 text-blue-700 text-xs font-bold rounded-lg border border-gray-200 hover:bg-blue-50 hover:border-blue-200 transition-all shadow-sm active:scale-95">
                          {task}
                        </button>
                      ))}
                    </div>
                    <textarea value={diaryText} onChange={(e) => setDiaryText(e.target.value)} placeholder="每換一行，就會在日曆上產生一個新的待辦任務方塊喔！" className="flex-1 w-full p-3 bg-blue-50/30 border border-blue-100 rounded-xl focus:border-blue-400 focus:ring-0 resize-none text-sm text-gray-700 leading-relaxed custom-scrollbar" />
                    <button onClick={handleSaveDiary} disabled={isSavingDiary} className="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl shadow-md active:scale-95 flex justify-center gap-1.5 text-sm">
                      {isSavingDiary ? '儲存中...' : <><CheckCircle2 className="w-4 h-4" /> 完成</>}
                    </button>
                  </div>
                )}

                {/* 統計面板 */}
                {activeTab === 'stats' && (
                  <div className="flex flex-col h-full bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                    <div className="flex justify-between items-center border-b border-gray-100 pb-3 mb-4 flex-shrink-0">
                      <h2 className="text-lg font-bold text-orange-800 flex items-center gap-2"><img src={POKE_IMAGES.charizard} className="w-6 h-6 object-contain" /> 本月彙整</h2>
                      <button onClick={handleExportCSV} className="bg-green-500 hover:bg-green-600 text-white font-bold p-1.5 rounded-lg transition-all shadow-sm active:scale-95" title="匯出 CSV">
                        <FileSpreadsheet className="w-4 h-4" />
                      </button>
                    </div>
                    
                    <div className="grid grid-cols-3 gap-2 mb-5 flex-shrink-0">
                      <div className="bg-gray-50 p-2 rounded-xl text-center border border-gray-100">
                        <div className="text-[10px] text-gray-500 font-bold">總收入</div>
                        <div className="text-sm font-black text-green-600">${currentMonthStats.totalIncome}</div>
                      </div>
                      <div className="bg-gray-50 p-2 rounded-xl text-center border border-gray-100">
                        <div className="text-[10px] text-gray-500 font-bold">總支出</div>
                        <div className="text-sm font-black text-red-500">${currentMonthStats.totalExpense}</div>
                      </div>
                      <div className={`p-2 rounded-xl text-center border ${currentMonthStats.net >= 0 ? 'bg-green-50 border-green-100' : 'bg-red-50 border-red-100'}`}>
                        <div className={`text-[10px] font-bold ${currentMonthStats.net >= 0 ? 'text-green-700' : 'text-red-700'}`}>結餘</div>
                        <div className={`text-sm font-black ${currentMonthStats.net >= 0 ? 'text-green-600' : 'text-red-600'}`}>${currentMonthStats.net}</div>
                      </div>
                    </div>

                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-4">
                      {currentMonthStats.totalExpense === 0 && currentMonthStats.totalIncome === 0 ? (
                        <div className="text-center py-10 text-gray-400 text-xs font-bold"><img src={POKE_IMAGES.slowpoke} className="w-16 h-16 mx-auto opacity-50 mb-2" />無紀錄</div>
                      ) : (
                        Object.entries(currentMonthStats.stats).sort(([, a], [, b]) => b - a).map(([type, amount]) => {
                          const catInfo = INCOME_CATEGORIES.find(c => c.name === type) || EXPENSE_CATEGORIES.find(c => c.name === type) || EXPENSE_CATEGORIES.find(c => c.name === '其他');
                          const percentage = ((amount / (currentMonthStats.totalExpense + currentMonthStats.totalIncome)) * 100).toFixed(1);
                          return (
                            <div key={type} className="relative">
                              <div className="flex justify-between items-center text-xs font-bold text-gray-700 mb-1">
                                <span className="flex items-center gap-1.5 truncate min-w-0">
                                  <img src={catInfo.icon} className="w-5 h-5 object-contain flex-shrink-0" /> <span className="truncate">{type}</span>
                                </span>
                                <span className="text-gray-600 flex-shrink-0">${amount} <span className="text-gray-400 text-[10px]">({percentage}%)</span></span>
                              </div>
                              <div className="w-full bg-gray-100 rounded-full h-2 overflow-hidden shadow-inner">
                                <div className={`h-full rounded-full ${catInfo.color.split(' ')[0]} bg-opacity-80`} style={{ width: `${percentage}%` }}></div>
                              </div>
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* === 日曆專屬：每日詳細資訊彈出視窗 === */}
          {showDayModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm" onClick={() => setShowDayModal(false)}>
              <div className="bg-white rounded-3xl w-full max-w-lg shadow-2xl border-4 border-yellow-400 relative flex flex-col max-h-[85vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                
                <div className="bg-yellow-50 px-6 py-4 border-b border-yellow-200 flex justify-between items-center flex-shrink-0">
                  <div className="flex items-center gap-3">
                    <img src={POKE_IMAGES.pikachu} className="w-8 h-8 object-contain" />
                    <div>
                      <h2 className="text-xl font-black text-gray-800">{currentDate}</h2>
                      {(TAIWAN_HOLIDAYS_MAP[currentDate] || LUNAR_FIRST_MAP[currentDate] || (LUNAR_FIFTEENTH.includes(currentDate) ? '十五' : null)) && (
                        <div className="text-xs font-bold text-red-500 mt-0.5">
                          {TAIWAN_HOLIDAYS_MAP[currentDate]} {LUNAR_FIRST_MAP[currentDate] || (LUNAR_FIFTEENTH.includes(currentDate) ? '十五' : null)}
                        </div>
                      )}
                    </div>
                  </div>
                  <button onClick={() => setShowDayModal(false)} className="p-2 bg-white rounded-full text-gray-400 hover:text-gray-700 hover:bg-gray-100 transition-colors shadow-sm">
                    <X className="w-5 h-5" />
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar space-y-6 relative">
                  <img src={POKE_IMAGES.eevee} className="absolute -bottom-4 -right-4 w-32 h-32 opacity-10 object-contain pointer-events-none" />
                  
                  <section>
                    <h3 className="text-lg font-bold text-blue-800 flex items-center gap-2 mb-3 border-b-2 border-blue-100 pb-1">
                      <Shield className="w-5 h-5" /> 冒險日誌 & 待辦
                    </h3>
                    {diaryText ? (
                      <div className="space-y-2 relative z-10">
                        {diaryText.split('\n').filter(t => t.trim() !== '').map((task, idx) => (
                          <div key={idx} className="bg-blue-50 text-blue-800 px-3 py-2 rounded-xl text-sm font-bold shadow-sm border border-blue-100 flex items-start gap-2 min-w-0">
                            <span className="mt-0.5 flex-shrink-0">•</span> <span className="break-words min-w-0">{task}</span>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-sm text-gray-400 font-bold italic relative z-10">這天沒有留下任何日記或待辦事項。</div>
                    )}
                  </section>

                  <section>
                    <div className="flex justify-between items-end border-b-2 border-orange-100 pb-1 mb-3">
                      <h3 className="text-lg font-bold text-orange-800 flex items-center gap-2">
                        <Zap className="w-5 h-5" /> 收支明細
                      </h3>
                      <div className={`font-black ${todaysExpenses.reduce((sum, e) => sum + (e.transactionMode==='income'?e.amount:-e.amount), 0) >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                        總計: ${todaysExpenses.reduce((sum, e) => sum + (e.transactionMode==='income'?e.amount:-e.amount), 0)}
                      </div>
                    </div>
                    {todaysExpenses.length > 0 ? (
                      <div className="space-y-2 relative z-10">
                        {todaysExpenses.map(e => {
                          const isIncome = e.transactionMode === 'income';
                          const catInfo = (isIncome ? INCOME_CATEGORIES : EXPENSE_CATEGORIES).find(c => c.name === e.type) || (isIncome ? INCOME_CATEGORIES.find(c => c.name === '其他') : EXPENSE_CATEGORIES.find(c => c.name === '其他'));
                          return (
                            <div key={e.id} className="flex justify-between items-center p-2.5 bg-gray-50 rounded-xl border border-gray-100 min-w-0">
                              <div className="flex items-center gap-3 min-w-0">
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${catInfo.color}`}><img src={catInfo.icon} className="w-5 h-5" /></div>
                                <div className="min-w-0">
                                  <div className="text-sm font-bold text-gray-700 leading-tight truncate">{e.type}</div>
                                  {e.note && <div className="text-xs text-gray-500 truncate">{e.note}</div>}
                                </div>
                              </div>
                              <span className={`font-black text-sm flex-shrink-0 ${isIncome ? 'text-green-600' : 'text-red-500'}`}>{isIncome ? '+' : '-'}${e.amount}</span>
                            </div>
                          );
                        })}
                      </div>
                    ) : (
                      <div className="text-sm text-gray-400 font-bold italic relative z-10">這天沒有任何花費或收入紀錄。</div>
                    )}
                  </section>
                </div>

                <div className="p-4 bg-gray-50 border-t border-gray-100 flex gap-3 flex-shrink-0 z-10">
                  <button onClick={() => { setShowDayModal(false); setActiveTab('diary'); }} className="flex-1 py-2.5 bg-blue-100 text-blue-700 hover:bg-blue-200 font-bold rounded-xl transition-colors text-sm shadow-sm">寫日記</button>
                  <button onClick={() => { setShowDayModal(false); setActiveTab('accounting'); }} className="flex-1 py-2.5 bg-yellow-400 text-yellow-900 hover:bg-yellow-500 font-bold rounded-xl transition-colors text-sm shadow-sm">去記帳</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
